StylesPath = styles
MinAlertLevel = suggestion

[asciidoctor]
attribute-missing = skip


[*en/*.adoc]
BasedOnStyles = Outscale, OutscaleEN

[*en/*Release-Notes*.adoc]
BasedOnStyles = Outscale, OutscaleEN, ReleaseNotes

[*fr/*.adoc]
BasedOnStyles = Outscale, OutscaleFR

[*fr/*{Release-Notes,Notes-de-mise-à-jour}*.adoc]
BasedOnStyles = Outscale, OutscaleFR, ReleaseNotes


[formats]
csv = md

[*.{md,csv}]
BasedOnStyles = Outscale, OutscaleEN
Outscale.BadSpacing2 = NO
Outscale.RelativeSiteUrl = NO
OutscaleEN.TitleCaps = NO
